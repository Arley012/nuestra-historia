<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños, Dani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     TOKENS — degradado celeste tomado de la invitación,
     tipografía limpia y bold como la referencia de diseño.
     ============================================================ */
  :root{
    --sky-top:#BDEFF7;
    --sky-mid:#57C2E0;
    --sky-deep:#1E77A8;
    --navy:#152A4A;
    --white:#FFFFFF;
    --gold:#C9A46A;
    --ink-soft:rgba(21,42,74,.6);
    --ease:cubic-bezier(.16,.84,.44,1);
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    font-family:'Inter', sans-serif;
    min-height:100svh;
    background:linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 55%, var(--sky-deep) 100%);
    display:flex;
    flex-direction:column;
    color:var(--navy);
    -webkit-font-smoothing:antialiased;
  }

  /* ============================================================
     CONTENIDO CENTRAL
     ============================================================ */
  .stage{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px clamp(20px,6vw,60px) 60px;
  }

  .card{
    background:rgba(255,255,255,.88);
    backdrop-filter:blur(10px);
    border-radius:32px;
    padding:clamp(40px,7vw,72px) clamp(28px,7vw,80px);
    max-width:620px;
    width:100%;
    text-align:center;
    box-shadow:0 30px 80px rgba(21,42,74,.18);
    opacity:0;
    transform:translateY(24px);
    animation:cardIn 1s var(--ease) forwards .15s;
  }

  @keyframes cardIn{
    to{opacity:1; transform:translateY(0);}
  }

  .eyebrow{
    font-size:.72rem;
    letter-spacing:.3em;
    text-transform:uppercase;
    font-weight:700;
    color:var(--gold);
    margin-bottom:18px;
  }

  h1{
    font-size:clamp(2.1rem, 6vw, 3.4rem);
    font-weight:800;
    letter-spacing:-0.01em;
    line-height:1.05;
    text-transform:uppercase;
    color:var(--navy);
  }

  .subtitle{
    margin-top:16px;
    font-size:1rem;
    font-weight:500;
    color:var(--ink-soft);
    max-width:420px;
    margin-left:auto;
    margin-right:auto;
  }

  /* ============================================================
     CONTADOR
     ============================================================ */
  .countdown{
    display:flex;
    justify-content:center;
    gap:clamp(10px,3vw,22px);
    margin:44px 0 8px;
  }

  .cd-unit{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    min-width:64px;
  }

  .cd-number{
    font-size:clamp(2.1rem, 7vw, 3.2rem);
    font-weight:800;
    font-variant-numeric:tabular-nums;
    color:var(--navy);
    line-height:1;
  }

  .cd-label{
    font-size:.62rem;
    letter-spacing:.2em;
    text-transform:uppercase;
    font-weight:700;
    color:var(--ink-soft);
  }

  .cd-sep{
    font-size:clamp(1.6rem,5vw,2.4rem);
    font-weight:300;
    color:var(--gold);
    align-self:flex-start;
    margin-top:2px;
  }

  /* estado: ya es su cumpleaños */
  .arrived-message{
    display:none;
    font-size:clamp(1.4rem, 4vw, 2rem);
    font-weight:700;
    color:var(--navy);
    margin:44px 0 8px;
  }

  body.unlocked .countdown{display:none;}
  body.unlocked .arrived-message{display:block;}

  /* ============================================================
     BOTÓN DE DESCARGA — bloqueado hasta medianoche del 21
     ============================================================ */
  .download-area{
    margin-top:38px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
  }

  .btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:16px 34px;
    border-radius:999px;
    font-size:.92rem;
    font-weight:700;
    letter-spacing:.02em;
    text-decoration:none;
    transition:transform .4s var(--ease), box-shadow .4s var(--ease), background .4s var(--ease), color .4s var(--ease);
  }

  .btn.locked{
    background:rgba(21,42,74,.08);
    color:rgba(21,42,74,.4);
    cursor:not-allowed;
    pointer-events:none;
  }

  .btn.unlocked{
    background:linear-gradient(135deg, var(--gold) 0%, #A9835A 100%);
    color:var(--white);
    box-shadow:0 16px 34px rgba(201,164,106,.4);
  }

  .btn.unlocked:hover{
    transform:translateY(-3px);
    box-shadow:0 20px 42px rgba(201,164,106,.5);
  }

  .lock-icon, .heart-icon{
    width:16px;
    height:16px;
    flex-shrink:0;
  }

  .btn.unlocked .lock-icon{display:none;}
  .btn.locked .heart-icon{display:none;}

  .hint{
    font-size:.76rem;
    color:var(--ink-soft);
    font-weight:500;
  }

  body.unlocked .hint{display:none;}

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width:420px){
    .cd-sep{display:none;}
    .countdown{gap:14px;}
  }
</style>
</head>
<body>

<main class="stage">
  <div class="card">
    <p class="eyebrow">Cumpleaños de Dani</p>
    <h1>Feliz<br>Cumpleaños</h1>
    <p class="subtitle" id="subtitle">Faltan estos días, horas, minutos y segundos para celebrarte como te mereces.</p>

    <div class="countdown" id="countdown" aria-live="polite">
      <div class="cd-unit"><span class="cd-number" id="cd-days">00</span><span class="cd-label">Días</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-unit"><span class="cd-number" id="cd-hours">00</span><span class="cd-label">Horas</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-unit"><span class="cd-number" id="cd-min">00</span><span class="cd-label">Min</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-unit"><span class="cd-number" id="cd-sec">00</span><span class="cd-label">Seg</span></div>
    </div>

    <p class="arrived-message" id="arrived-message">Hoy es tu día. Feliz cumpleaños, mi amor.</p>

    <div class="download-area">
      <a href="invitacion-dani.pdf" download="Dani-Cumpleanos.pdf" class="btn locked" id="download-btn">
        <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        <svg class="heart-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.7-10-9.3C.4 8.4 2 4.8 5.6 4.1c2-.4 4 .5 5 2.1 1-1.6 3-2.5 5-2.1 3.6.7 5.2 4.3 3.6 7.6C19.5 16.3 12 21 12 21z"/></svg>
        <span id="btn-label">Desbloquear sorpresa</span>
      </a>
      <p class="hint" id="hint">Se desbloquea a la medianoche del 21 de julio</p>
    </div>
  </div>
</main>

<script>
  /* ============================================================
     FECHA OBJETIVO — medianoche del 21 de julio de 2026
     ============================================================ */
  const TARGET_DATE = new Date('2026-07-21T00:00:00');

  function pad(n){ return String(n).padStart(2, '0'); }

  const downloadBtn = document.getElementById('download-btn');
  const btnLabel = document.getElementById('btn-label');
  let unlocked = false;

  function unlock(){
    if (unlocked) return;
    unlocked = true;
    document.body.classList.add('unlocked');
    downloadBtn.classList.remove('locked');
    downloadBtn.classList.add('unlocked');
    btnLabel.textContent = 'Descargar sorpresa';
  }

  function tick(){
    const now = new Date();
    const diff = TARGET_DATE - now;

    if (diff <= 0){
      unlock();
      return;
    }

    const days  = Math.floor(diff / 86400000);
    const hours = Math.floor((diff / 3600000) % 24);
    const mins  = Math.floor((diff / 60000) % 60);
    const secs  = Math.floor((diff / 1000) % 60);

    document.getElementById('cd-days').textContent  = pad(days);
    document.getElementById('cd-hours').textContent = pad(hours);
    document.getElementById('cd-min').textContent   = pad(mins);
    document.getElementById('cd-sec').textContent   = pad(secs);
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
